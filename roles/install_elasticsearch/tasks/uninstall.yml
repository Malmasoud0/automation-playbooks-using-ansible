---
# uninstall file for install_elasticsearch role

- name: Stop and disable Elasticsearch service
  ansible.builtin.systemd_service:
    name: "{{ elasticsearch_service_name }}"
    state: stopped
    enabled: false
  become: true
  ignore_errors: true

- name: Remove Elasticsearch packages and purge configuration
  ansible.builtin.apt:
    name: "{{ elasticsearch_packages }}"
    state: absent
    purge: true
  become: true

- name: Remove Elasticsearch GPG keyring and APT repository source
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  become: true
  loop:
    - "{{ elasticsearch_apt_keyring_path }}"
    - "/etc/apt/sources.list.d/elastic.list"

- name: Remove Elasticsearch configuration, data, and log directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  become: true
  loop:
    - "/etc/elasticsearch"
    - "/var/lib/elasticsearch"
    - "/var/log/elasticsearch"
    - "/usr/share/elasticsearch"

- name: Run apt-get autoremove
  ansible.builtin.apt:
    autoremove: true
  become: true
