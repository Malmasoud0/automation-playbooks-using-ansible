---
# tasks file for install_elasticsearch role

- name: Ensure Ubuntu system is targeted
  ansible.builtin.fail:
    msg: "This role is designed specifically for Ubuntu systems. Found: {{ ansible_distribution }}"
  when: ansible_distribution != 'Ubuntu'

- name: Install system dependencies for APT repositories
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
    state: present
    update_cache: true
  become: true

- name: Create secure APT keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true

- name: Download official Elasticsearch APT GPG key securely
  ansible.builtin.get_url:
    url: "{{ elasticsearch_apt_key_url }}"
    dest: "{{ elasticsearch_apt_keyring_path }}"
    mode: '0644'
  become: true

- name: Add official Elasticsearch APT repository with signed-by keyring
  ansible.builtin.apt_repository:
    repo: "{{ elasticsearch_apt_repo }}"
    state: present
    update_cache: true
    filename: elastic
  become: true

- name: Install Elasticsearch
  ansible.builtin.apt:
    name: "{{ elasticsearch_packages }}"
    state: present
  become: true

- name: Configure JVM Heap limits for WSL memory optimization
  ansible.builtin.copy:
    content: |
      -Xms{{ elasticsearch_min_heap_size }}
      -Xmx{{ elasticsearch_max_heap_size }}
    dest: "{{ elasticsearch_jvm_options_file }}"
    owner: root
    group: elasticsearch
    mode: '0644'
  become: true
  notify: Restart Elasticsearch

- name: Write Elasticsearch configuration file
  ansible.builtin.template:
    src: elasticsearch.yml.j2
    dest: /etc/elasticsearch/elasticsearch.yml
    owner: root
    group: elasticsearch
    mode: '0660'
  become: true
  notify: Restart Elasticsearch

- name: Flush handlers to restart Elasticsearch immediately if needed
  ansible.builtin.meta: flush_handlers

- name: Ensure Elasticsearch service is started and enabled on boot
  ansible.builtin.systemd_service:
    name: "{{ elasticsearch_service_name }}"
    state: "{{ elasticsearch_service_state }}"
    enabled: "{{ elasticsearch_service_enabled }}"
    daemon_reload: true
  become: true

- name: Wait for Elasticsearch to start and listen on port {{ elasticsearch_http_port }}
  ansible.builtin.wait_for:
    port: "{{ elasticsearch_http_port }}"
    delay: 5
    timeout: 90

- name: Check if elastic user can authenticate with current password
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ elasticsearch_http_port }}/"
    user: "elastic"
    password: "{{ elasticsearch_admin_password }}"
    force_basic_auth: yes
    method: GET
    status_code: [200]
  register: elastic_auth_test
  ignore_errors: true
  when: elasticsearch_security_enabled | bool

- name: Set password for elastic superuser
  ansible.builtin.shell: |
    printf "y\n{{ elasticsearch_admin_password }}\n{{ elasticsearch_admin_password }}\n" | /usr/share/elasticsearch/bin/elasticsearch-reset-password -u elastic -i -f
  become: true
  when:
    - elasticsearch_security_enabled | bool
    - (elastic_auth_test.status is not defined) or (elastic_auth_test.status != 200)

- name: Check if kibana_system user can authenticate with current password
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ elasticsearch_http_port }}/"
    user: "kibana_system"
    password: "{{ elasticsearch_kibana_system_password }}"
    force_basic_auth: yes
    method: GET
    status_code: [200]
  register: kibana_system_auth_test
  ignore_errors: true
  when: elasticsearch_security_enabled | bool

- name: Set password for kibana_system user
  ansible.builtin.shell: |
    printf "y\n{{ elasticsearch_kibana_system_password }}\n{{ elasticsearch_kibana_system_password }}\n" | /usr/share/elasticsearch/bin/elasticsearch-reset-password -u kibana_system -i -f
  become: true
  when:
    - elasticsearch_security_enabled | bool
    - (kibana_system_auth_test.status is not defined) or (kibana_system_auth_test.status != 200)
