---
# uninstall file for install_metricbeat_k8s role

- name: Check if manifests.yaml exists
  ansible.builtin.stat:
    path: /tmp/metricbeat_k8s/manifests.yaml
  register: manifests_stat

- name: Delete Metricbeat Kubernetes resources using manifests.yaml (as non-root user)
  ansible.builtin.command:
    cmd: "sg docker -c 'kubectl delete -f /tmp/metricbeat_k8s/manifests.yaml'"
  become: true
  become_user: "{{ minikube_user | default('ansible') }}"
  failed_when: false
  changed_when: true
  when: manifests_stat.stat.exists

- name: Delete kube-state-metrics from official upstream repository
  ansible.builtin.command:
    cmd: "sg docker -c 'kubectl delete -k github.com/kubernetes/kube-state-metrics/examples/standard'"
  become: true
  become_user: "{{ minikube_user | default('ansible') }}"
  failed_when: false
  changed_when: true

- name: Clean up temporary directory
  ansible.builtin.file:
    path: /tmp/metricbeat_k8s
    state: absent
  become: true
