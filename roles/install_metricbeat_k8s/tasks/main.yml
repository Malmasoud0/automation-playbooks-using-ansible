---
# tasks file for install_metricbeat_k8s role

- name: Deploy kube-state-metrics from official upstream repository
  ansible.builtin.command:
    cmd: "sg docker -c 'kubectl apply -k github.com/kubernetes/kube-state-metrics/examples/standard'"
  become: true
  become_user: "{{ minikube_user | default('ansible') }}"
  register: ksm_deploy_output
  changed_when: "'created' in ksm_deploy_output.stdout or 'configured' in ksm_deploy_output.stdout"

- name: Create local temporary directory for templated manifests
  ansible.builtin.file:
    path: /tmp/metricbeat_k8s
    state: directory
    mode: '0755'
  become: true

- name: Template Metricbeat Kubernetes manifests
  ansible.builtin.template:
    src: metricbeat-k8s-manifests.yaml.j2
    dest: /tmp/metricbeat_k8s/manifests.yaml
    mode: '0644'
  become: true

- name: Apply Metricbeat Kubernetes manifests (as non-root user)
  ansible.builtin.command:
    cmd: "sg docker -c 'kubectl apply -f /tmp/metricbeat_k8s/manifests.yaml'"
  become: true
  become_user: "{{ minikube_user | default('ansible') }}"
  register: apply_manifests_output
  changed_when: "'created' in apply_manifests_output.stdout or 'configured' in apply_manifests_output.stdout"

- name: Wait for Metricbeat deployment to roll out successfully
  ansible.builtin.command:
    cmd: "sg docker -c 'kubectl rollout status deployment/metricbeat-deployment -n {{ metricbeat_k8s_namespace }} --timeout=120s'"
  become: true
  become_user: "{{ minikube_user | default('ansible') }}"
  register: rollout_status_output
  changed_when: false
